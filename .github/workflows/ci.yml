name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.22", "1.23"]
    steps:
      - name: Checkout main honker
        uses: actions/checkout@v4
        with:
          repository: russellromney/honker
          path: main

      - name: Prep submodule path
        run: rm -rf main/packages/honker-go
      - name: Checkout honker-go PR
        uses: actions/checkout@v4
        with:
          path: main/packages/honker-go

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: main

      - name: Build honker extension
        working-directory: main
        run: cargo build --release -p honker-extension

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Run tests
        working-directory: main/packages/honker-go
        run: go test ./...
